  <body class="manage-kids-page">
    <div class="sidebar-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-header-content">
            <div class="sidebar-logo" aria-hidden="true"></div>
            <div class="sidebar-title">Mood Lane</div>

        <nav class="sidebar-nav" aria-label="Primary">

    <main>
  <h1>Manage Kids</h1>

    <form id="addChildForm">
      <div class="corner-pixel top left"></div>
      <div class="corner-pixel top right"></div>
      <div class="corner-pixel bottom left"></div>
      <div class="corner-pixel bottom right"></div>

      <h2>> Add Child</h2>
      <p>Set up your new child's profile:</p>
      <div>
        <label>Name</label>
        <input type="text" id="name" required placeholder="Enter name..."/>
      </div>
      <div>
        <label>Chip ID</label>
        <input type="text" id="chipId" required placeholder="XX:XX:XX:XX"/>
      </div>
      <button class="submit" type="submit">Add Child</button>

    </form>

    <div id="kids-list">

    </div>

    </main>

    <script src="js/mobile-sidebar.js"></script>
    <script src="js/manage-kids.js"></script>
