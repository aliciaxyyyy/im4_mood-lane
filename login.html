<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="floating-dots-container">
    <h1>MOOD LANE</h1>

    <form id="loginForm">
      <div class="corner-pixel top left"></div>
      <div class="corner-pixel top right"></div>
      <div class="corner-pixel bottom left"></div>
      <div class="corner-pixel bottom right"></div>

      <h2>> Welcome Back</h2>
      <p>Every emotion has its place here.</p>
      <div>
        <label>Email</label>
        <input type="email" id="email" required />
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="password" required />
      </div>
      <p id="loginMessage" class="login-message" aria-live="polite"></p>
      <button class="submit" type="submit">Login</button>

      <p>Don’t have an account? <a href="register.html">Register here</a>.</p>
    </form>

    <script src="js/login.js"></script>
    <script src="js/floating-dots.js"></script>
  </body>
</html>
