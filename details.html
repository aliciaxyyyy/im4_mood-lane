<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/insight.css">
  </head>
  <body>
    <div class="sidebar-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-header-content">
            <div class="sidebar-logo" aria-hidden="true"></div>
            <div class="sidebar-title">Mood Lane</div>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Primary">
          <ul class="sidebar-nav-list">
            <li><a class="sidebar-nav-button active" href="index.html">Overview</a></li>
            <li><a class="sidebar-nav-button " href="manage-kids.html">Manage Kids</a></li>
            <li><a class="sidebar-nav-button logout" href="login.html">Log Out</a></li>
          </ul>
        </nav>
      </aside>
    </div>

    <main>
        <h1><span id="child-name"></span>'s Summary</h1>
        <h2><span id="date-start"></span> - <span id="date-end"></span></h2>
        <div class="insight-row-top">
            <div class="card emotion-flower">
              <h2>> Emotion Map</h2>
              <canvas id="emotion-radar" width="360" height="360" aria-label="Emotion radar chart"></canvas>
            </div>
            <div class="card emotion-breakdown">
                <h2>> Emotion Breakdown</h2>
                <div id="emotion-breakdown">
                    <div class="emotion-bar happy"><span>Happy</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                    <div class="emotion-bar proud"><span>Proud</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                    <div class="emotion-bar angry"><span>Angry</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                    <div class="emotion-bar surprised"><span>Surprised</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                    <div class="emotion-bar afraid"><span>Afraid</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                    <div class="emotion-bar sad"><span>Sad</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                    <div class="emotion-bar disgusted"><span>Disgusted</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                    <div class="emotion-bar neutral"><span>Neutral</span><span class="emotion-percentage">0%</span><div class="bar"><div class="fill"></div></div></div>
                </div>
            </div>
        </div>
        <div class="insight-row-bottom">
            <div class="card entry-count">
                <h2>> Number of entries</h2>
                <div id="entry-count">0</div>
            </div>
        </div>
    </main>

    <script src="js/mobile-sidebar.js"></script>
    <script src="js/details.js"></script>
  </body>
</html>
