<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="sidebar-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-header-content">
            <div class="sidebar-logo" aria-hidden="true"></div>
            <div class="sidebar-title">Mood Lane</div>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Primary">
          <ul class="sidebar-nav-list">
            <li><a class="sidebar-nav-button active" href="index.html">Overview</a></li>
            <li><a class="sidebar-nav-button" href="manage-kids.html">Manage Kids</a></li>
            <li><a class="sidebar-nav-button logout" href="login.html">Log Out</a></li>
          </ul>
        </nav>
      </aside>
    </div>

    <main class="dashboard-content">
      <h1>Select kid</h1>
      <div class="child-selector-container">
        <button type="button" class="child-button selected">
          <span class="child-name">Child 1</span>
        </button>
        <button type="button" class="child-button">
          <span class="child-name">Child 2</span>
        </button>
        <button type="button" class="child-button">
          <span class="child-name">Child 3</span>
        </button>
      </div>

      <section class="jar-section">
        <h2 class="jar-title">Emotion Jars</h2>

        <div class="view-modes">
          <button class="view-mode-button">Day</button>
          <button class="view-mode-button">Week</button>
          <button class="view-mode-button active">Month</button>
          <button class="view-mode-button">Year</button>
        </div>

        <p class="jar-subtitle">Each jar = one month</p>

        <div class="jar-grid">
          <div class="jar-card featured">
            <div class="jar jar-0">
            </div>
            <div class="jar-label selected">JAN</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-1"></div>
            <div class="jar-label">FEB</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-2"></div>
            <div class="jar-label">MAR</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-3"></div>
            <div class="jar-label">APR</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-4"></div>
            <div class="jar-label">MAY</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-5"></div>
            <div class="jar-label">JUN</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-6"></div>
            <div class="jar-label">JUL</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-7"></div>
            <div class="jar-label">AUG</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-8"></div>
            <div class="jar-label">SEP</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-9"></div>
            <div class="jar-label">OCT</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-10"></div>
            <div class="jar-label">NOV</div>
          </div>

          <div class="jar-card">
            <div class="jar jar-11"></div>
            <div class="jar-label">DEC</div>
          </div>
        </div>
      </section>

      <div class="summary">
        <h3>Summary</h3>
      </div>
    </main>

    <script src="js/mobile-sidebar.js"></script>
    <script src="js/overview.js"></script>
    <script src="js/insight.js"></script>

  </body>
</html>
